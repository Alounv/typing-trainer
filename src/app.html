<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!--
			Web fonts. Spline Sans for chrome, JetBrains Mono for drill and
			numerics. `preconnect` warms the TLS/DNS hop; `display=swap` shows
			fallback glyphs until the web font arrives rather than flashing
			invisible text. Weights are chosen to match the type hierarchy:
			400 body, 500 medium labels, 600/700 headings and display numbers.
		-->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap"
		/>
		<!--
			Theme init: set `data-theme` before first paint to prevent the
			stored theme from flashing through the default. Must be inline
			and synchronous. Mirrors the resolution logic in
			`src/lib/stores/theme.svelte.ts` — keep them in sync.
		-->
		<script>
			(function () {
				try {
					var stored = localStorage.getItem('theme');
					var choice = stored || 'system';
					var resolved;
					if (choice === 'system') {
						resolved = window.matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
					} else {
						resolved = choice;
					}
					document.documentElement.dataset.theme = resolved;
				} catch (e) {
					document.documentElement.dataset.theme = 'dark';
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
